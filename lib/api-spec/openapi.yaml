openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Binance Futures Testnet Trading Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List submitted orders
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: placeOrder
      tags: [orders]
      summary: Place a new futures order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "502":
          description: Binance API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /orders/stats:
    get:
      operationId: getOrderStats
      tags: [orders]
      summary: Order summary stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    OrderInput:
      type: object
      required: [symbol, side, orderType, quantity]
      properties:
        symbol:
          type: string
          example: BTCUSDT
        side:
          type: string
          enum: [BUY, SELL]
        orderType:
          type: string
          enum: [MARKET, LIMIT, STOP_LIMIT]
        quantity:
          type: string
          example: "0.01"
        price:
          type: ["string", "null"]
          example: "95000"
        stopPrice:
          type: ["string", "null"]
          example: "95500"

    Order:
      type: object
      required: [id, symbol, side, orderType, quantity, status, createdAt]
      properties:
        id:
          type: integer
        symbol:
          type: string
        side:
          type: string
        orderType:
          type: string
        quantity:
          type: string
        price:
          type: ["string", "null"]
        stopPrice:
          type: ["string", "null"]
        status:
          type: string
        binanceOrderId:
          type: ["string", "null"]
        avgPrice:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    OrderStats:
      type: object
      required: [total, filled, new, failed, bySymbol, bySide]
      properties:
        total:
          type: integer
        filled:
          type: integer
        new:
          type: integer
        failed:
          type: integer
        bySymbol:
          type: array
          items:
            type: object
            required: [symbol, count]
            properties:
              symbol:
                type: string
              count:
                type: integer
        bySide:
          type: object
          required: [BUY, SELL]
          properties:
            BUY:
              type: integer
            SELL:
              type: integer

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
