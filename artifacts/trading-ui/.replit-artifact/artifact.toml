kind = "web"
previewPath = "/"
title = "Binance Trading UI"
version = "1.0.0"
id = "artifacts/trading-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18479

[services.development]
run = "pnpm --filter @workspace/trading-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trading-ui", "run", "build" ]
publicDir = "artifacts/trading-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18479"
BASE_PATH = "/"
